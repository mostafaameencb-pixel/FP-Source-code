<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - الرئيسية</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../css/admin.css">

</head>

<body>

    <div id="sidebar-placeholder"></div>

    <div class="admin-content">
        <h2 class="fw-bold mb-4">لوحة القيادة</h2>

        <div class="row g-4">
            <!-- Users Stat -->
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="icon-box bg-soft-primary">
                        <i class="fas fa-users"></i>
                    </div>
                    <h6 class="text-muted">إجمالي المستخدمين</h6>
                    <h2 class="fw-bold mb-0" id="statUsers">...</h2>
                </div>
            </div>

            <!-- Posts Stat -->
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="icon-box bg-soft-success">
                        <i class="fas fa-comments"></i>
                    </div>
                    <h6 class="text-muted">إجمالي المنشورات</h6>
                    <h2 class="fw-bold mb-0" id="statPosts">...</h2>
                </div>
            </div>

            <!-- Blocked Stat (Optional) -->
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="icon-box bg-soft-danger">
                        <i class="fas fa-user-slash"></i>
                    </div>
                    <h6 class="text-muted">المستخدمين المحظورين</h6>
                    <h2 class="fw-bold mb-0" id="statBlocked">...</h2>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../js/admin_dashboard.js"></script>
</body>

</html>
