<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مجتمع M-PATH</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/posts.css">
</head>

<body>

    <div id="navbar-placeholder"></div>

    <main class="container py-5 mt-5">

        <div class="row justify-content-center">
            <div class="col-lg-8">
                <!-- Header -->
                <div class="text-center mb-5">
                    <h2 class="fw-bold display-6 mb-3">مجتمعنا </h2>
                    <p class="text-muted">شارك تجربتك مع الاخرين</p>
                </div>

                <!-- Create Post Box -->
                <div class="create-post-card mb-5">
                    <div class="d-flex align-items-start gap-3">
                        <div class="user-avatar-sm">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="flex-grow-1">
                            <textarea id="postContent" class="form-control post-input" rows="3"
                                placeholder="اوصف تجربتك هنا.."></textarea>
                            <div class="d-flex justify-content-end mt-3">
                                <button id="btnPublish" class="btn btn-primary-custom px-4">
                                    <span id="btnText">نشر</span>
                                    <div id="btnLoader" class="spinner-border spinner-border-sm d-none" role="status">
                                    </div>
                                </button>
                            </div>
                            <div id="postError" class="text-danger small mt-2 d-none"></div>
                        </div>
                    </div>
                </div>

                <!-- Posts Feed -->
                <div id="postsFeed" class="d-flex flex-column gap-4">
                    <!-- Loading State -->
                    <div class="text-center py-5" id="feedLoader">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p class="mt-2 text-muted">جاري تحميل المنشورات...</p>
                    </div>
                </div>

            </div>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Moment.js for Time formatting -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/locale/ar.min.js"></script>

    <script type="module" src="../../js/posts.js"></script>
</body>

</html>
