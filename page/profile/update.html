<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعديل البيانات - FitLife</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700;800;900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/profile.css">
</head>

<body>

    <div id="navbar-placeholder"></div>

    <main class="container py-5 mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="d-flex align-items-center mb-4">
                    <a href="profile.html" class="btn btn-light rounded-circle shadow-sm me-3">
                        <i class="fas fa-arrow-right text-muted"></i>
                    </a>
                    <h3 class="fw-bold mb-0">تعديل البيانات الشخصية</h3>
                </div>

                <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <!-- Alert Messages -->
                        <div id="errorMessage" class="alert d-none" role="alert"></div>

                        <form id="updateForm">
                            <!-- Personal Info -->
                            <h6 class="fw-bold mb-3 text-primary section-divider">المعلومات الأساسية</h6>
                            <div class="row g-3 mb-4">
                                <div class="col-md-6">
                                    <label class="form-label text-muted small">الاسم الكامل</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0"><i
                                                class="fas fa-user text-muted"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0" id="valName"
                                            required>
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label text-muted small">البريد الإلكتروني (لا يمكن
                                        تعديله)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-light border-end-0"><i
                                                class="fas fa-envelope text-muted"></i></span>
                                        <input type="email" class="form-control bg-light border-start-0 ps-0"
                                            id="valEmail" disabled>
                                    </div>
                                </div>
                            </div>

                            <!-- Health Info -->
                            <h6 class="fw-bold mb-3 text-primary section-divider">البيانات الصحية</h6>
                            <div class="row g-3 mb-4">
                                <div class="col-md-4">
                                    <label class="form-label text-muted small">العمر</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0"><i
                                                class="fas fa-birthday-cake text-muted"></i></span>
                                        <input type="number" class="form-control border-start-0 ps-0" id="valAge"
                                            required placeholder="سنة">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-muted small">الوزن (kg)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0"><i
                                                class="fas fa-weight-hanging text-muted"></i></span>
                                        <input type="number" step="0.1" class="form-control border-start-0 ps-0"
                                            id="valWeight" required placeholder="كجم">
                                    </div>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label text-muted small">الطول (cm)</label>
                                    <div class="input-group">
                                        <span class="input-group-text bg-white border-end-0"><i
                                                class="fas fa-ruler-vertical text-muted"></i></span>
                                        <input type="number" class="form-control border-start-0 ps-0" id="valHeight"
                                            required placeholder="سم">
                                    </div>
                                </div>
                                <div class="col-md-12">
                                    <label class="form-label text-muted small">الجنس</label>
                                    <select class="form-select" id="valGender" required>
                                        <option value="ذكر">ذكر</option>
                                        <option value="أنثى">أنثى</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Additional Info -->
                            <h6 class="fw-bold mb-3 text-primary section-divider">معلومات إضافية</h6>
                            <div class="mb-4">
                                <label class="form-label text-muted small">حالات صحية مزمنة (إن وجدت)</label>
                                <textarea class="form-control" id="chronicConditions" rows="3"
                                    placeholder="مثل: سكري، ضغط، حساسية طعام..."></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary-custom w-100 py-3 fw-bold shadow-sm">
                                <span id="btnText">حفظ التعديلات</span>
                                <div id="btnLoader" class="spinner-border spinner-border-sm d-none" role="status"></div>
                            </button>
                        </form>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Use existing profile.js which handles update logic -->
    <script type="module" src="../../js/profile.js"></script>
</body>

</html>
