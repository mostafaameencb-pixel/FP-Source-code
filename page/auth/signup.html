<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب جديد</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
      <!-- Font Awesome للأيقونات -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@200;300;400;600;700;800;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <link rel="stylesheet" href="../../css/auth.css">


</head>

<body>

    <div class="auth-container">
        <div class="card shadow-lg">
            <div class="card-header">
                <div class="logo-icon">
                    <i class="fas fa-lock"></i>
                </div>
                <h2 class="fw-bold text-dark">إنشاء حساب</h2>
                <p class="text-muted">انضم إلينا وابدأ تجربتك الفريدة</p>

            </div>

            <div class="card-body p-4 pt-2">
                <form id="loginForm">

                    <div class="mb-3">
                        <label class="form-label small fw-bold">الاسم الكامل</label>
                        <input type="text" id="fullName" class="form-control" placeholder="أدخل اسمك" required>
                    </div>


                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">العمر</label>
                            <input type="number" id="age" class="form-control" placeholder="عمرك" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">الجنس</label>
                            <select id="gender" class="form-select form-control" required>
                                <option value="">اختر..</option>
                                <option value="ذكر">ذكر</option>
                                <option value="أنثى">أنثى</option>
                            </select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">الوزن (كغ)</label>
                            <input type="number" id="weight" class="form-control" placeholder="وزنك" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">الطول (سم)</label>
                            <input type="number" id="height" class="form-control" placeholder="طولك" required>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label small fw-bold">حالات صحية مزمنة (اختياري)</label>
                        <textarea id="chronicConditions" class="form-control" rows="2"
                            placeholder='أدخل الأمراض إن وجدت (مثل: سكري، ضغط...)'></textarea>
                    </div>

                    <div class="mb-3 position-relative has-icon">
                        <label class="form-label ps-2 small fw-bold">البريد الإلكتروني</label>
                        <i class="fas fa-envelope input-group-text"></i>
                        <input type="email" id="email" class="form-control" placeholder="example@mail.com" required>
                    </div>

                    <!-- كلمة المرور -->
                    <div class="mb-2 position-relative has-icon">
                        <label class="form-label ps-2 small fw-bold">كلمة المرور</label>
                        <i class="fas fa-key input-group-text"></i>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>

            

                    <button type="submit" id="btnSignup" class="btn btn-login w-100">
                        <span id="btnText">إنشاء الحساب</span>
                        <div id="btnLoader" class="spinner-border spinner-border-sm d-none" role="status"></div>
                    </button>




                    <div class="text-center">
                        <p class="small text-muted">لديك حساب بالفعل؟ <a href="login.html"
                                class="text-decoration-none text-primary fw-bold">تسجيل الدخول</a></p>
                    </div>

                 
                </form>

                <div id="errorMessage" class="alert alert-danger mt-3 d-none p-2 small text-center"></div>
            </div>
        </div>
    </div>



    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="../../js/signup.js"></script>
</body>

</html>
